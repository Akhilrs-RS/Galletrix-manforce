services:
  # Backend API Service
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: manforce-erp-api
    restart: always
    ports:
      - "5001:5001"
    environment:
      NODE_ENV: production
      ASPNETCORE_URLS: http://+:5001
      ConnectionStrings__DefaultConnection: "Server=manforce-mysql;Port=3306;Database=manforce_erp;User=root;Password=root;"
      JWT_SECRET: ${JWT_SECRET:-supersecret_manforce_erp_2026}
    networks:
      - erp-network

networks:
  erp-network:
    name: shared-erp-network
    external: true
