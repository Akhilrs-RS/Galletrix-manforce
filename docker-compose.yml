version: '3.8'

services:
  # PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: manforce-erp-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-manforce_erp_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - erp-network

  # pgAdmin (Optional - GUI for Postgres)
  pgadmin:
    image: dpage/pgadmin4
    container_name: manforce-erp-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@manforce.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - erp-network

  # Backend API Service
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: manforce-erp-api
    restart: always
    ports:
      - "5001:5001"
    environment:
      NODE_ENV: production
      PORT: 5001
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-manforce_erp_dev}
      JWT_SECRET: ${JWT_SECRET:-supersecret_manforce_erp_2026}
    depends_on:
      - db
    networks:
      - erp-network

volumes:
  pgdata:

networks:
  erp-network:
    driver: bridge
